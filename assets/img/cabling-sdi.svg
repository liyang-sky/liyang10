<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" role="img" aria-label="12G-SDI 鐩存挱涓绘帶鎺ョ嚎绀烘剰">
    <defs>
        <linearGradient id="dev" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#1f242c"/>
            <stop offset="100%" stop-color="#0e1116"/>
        </linearGradient>
    </defs>
    <!-- 鍒囨崲鍙?-->
    <rect x="20" y="55" width="100" height="70" rx="6" fill="url(#dev)" stroke="#3a3f47"/>
    <text x="70" y="85" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#cfd6df">鍒囨崲鍙?/text>
    <text x="70" y="100" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#9aa4b2">12G-SDI OUT</text>

    <!-- 鐩戣鍣?-->
    <rect x="240" y="35" width="100" height="110" rx="6" fill="url(#dev)" stroke="#3a3f47"/>
    <rect x="252" y="47" width="76" height="60" rx="3" fill="#0a0d12" stroke="#2a3038"/>
    <text x="290" y="83" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#3aa0ff">4K HDR</text>
    <text x="290" y="130" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#cfd6df">BVM-HX3110</text>

    <!-- 鎺ョ嚎 -->
    <path d="M120 90 L240 90" stroke="#3aa0ff" stroke-width="2.5" fill="none"/>
    <text x="180" y="82" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#3aa0ff">12G-SDI</text>

    <!-- 鎽勫儚鏈?-->
    <rect x="20" y="145" width="100" height="25" rx="4" fill="url(#dev)" stroke="#3a3f47"/>
    <text x="70" y="161" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#9aa4b2">鎽勫儚鏈?/ 褰曞儚鏈?/text>
    <path d="M120 158 L180 158 L180 110" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
</svg>
