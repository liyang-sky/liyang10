<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" role="img" aria-label="BVM-HX3110 鍚庨潰鏉挎帴鍙ｇず鎰?>
    <defs>
        <linearGradient id="rear" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#2a2e34"/>
            <stop offset="100%" stop-color="#101317"/>
        </linearGradient>
    </defs>
    <!-- 鑳屾澘 -->
    <rect x="20" y="20" width="560" height="200" rx="10" fill="url(#rear)" stroke="#3a3f47"/>
    <!-- 鐢垫簮 -->
    <rect x="40" y="40" width="80" height="50" rx="4" fill="#0d1116" stroke="#3a3f47"/>
    <text x="80" y="70" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#9aa4b2">AC IN</text>

    <!-- SDI 杈撳叆鍖?-->
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#9aa4b2" text-anchor="middle">
        <rect x="140" y="40" width="50" height="36" rx="3" fill="#0d1116" stroke="#3a3f47"/>
        <text x="165" y="62">12G-SDI A</text>
        <rect x="200" y="40" width="50" height="36" rx="3" fill="#0d1116" stroke="#3a3f47"/>
        <text x="225" y="62">12G-SDI B</text>
        <rect x="260" y="40" width="50" height="36" rx="3" fill="#0d1116" stroke="#3a3f47"/>
        <text x="285" y="62">12G-SDI C</text>
        <rect x="320" y="40" width="50" height="36" rx="3" fill="#0d1116" stroke="#3a3f47"/>
        <text x="345" y="62">12G-SDI D</text>
    </g>

    <!-- HDMI / DisplayPort -->
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#9aa4b2" text-anchor="middle">
        <rect x="140" y="86" width="80" height="20" rx="3" fill="#0d1116" stroke="#3a3f47"/>
        <text x="180" y="100">HDMI</text>
        <rect x="230" y="86" width="80" height="20" rx="3" fill="#0d1116" stroke="#3a3f47"/>
        <text x="270" y="100">DisplayPort</text>
    </g>

    <!-- IP / SFP28 -->
    <rect x="320" y="86" width="50" height="20" rx="3" fill="#0d1116" stroke="#3a3f47"/>
    <text x="345" y="100" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#9aa4b2">SFP28</text>

    <!-- EMO 杈撳嚭 -->
    <rect x="380" y="40" width="80" height="36" rx="3" fill="#0d1116" stroke="#3a3f47"/>
    <text x="420" y="62" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#9aa4b2">EMO OUT (12G-SDI)</text>

    <!-- LAN -->
    <rect x="470" y="40" width="50" height="36" rx="3" fill="#0d1116" stroke="#3a3f47"/>
    <text x="495" y="62" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#9aa4b2">LAN</text>

    <!-- USB -->
    <rect x="470" y="86" width="50" height="20" rx="3" fill="#0d1116" stroke="#3a3f47"/>
    <text x="495" y="100" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#9aa4b2">USB</text>

    <!-- 鏍囩 -->
    <g font-family="sans-serif" font-size="10" fill="#3aa0ff">
        <text x="40" y="200">鐢垫簮</text>
        <text x="140" y="200">12G-SDI 杈撳叆 脳4</text>
        <text x="140" y="125">HDMI / DP</text>
        <text x="320" y="125">IP (SFP28)</text>
        <text x="380" y="100">EMO 杈撳嚭</text>
        <text x="470" y="100">LAN / USB</text>
    </g>
    <text x="80" y="155" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#666">AC 100-240V 路 50/60Hz</text>
</svg>
